<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的个人主页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html" class="logo">🌿 我的主页</a>
      <div class="nav-links">
        <a href="index.html" class="active">首页</a>
        <a href="blog.html">博客</a>
        <a href="https://github.com" target="_blank">GitHub</a>
        <button id="theme-toggle" class="theme-toggle">🌙 暗黑</button>
      </div>
    </nav>

    <main>
      <div class="card">
        <h2>👋 你好，欢迎来到这里</h2>
        <p>这是一个采用低饱和度设计、支持暗黑模式的轻量级静态网站。全部页面由纯 HTML/CSS/JS 构建，部署在 GitHub Pages 上。</p>
        <a href="blog.html" class="btn">查看博客列表 →</a>
      </div>
      
      <div class="card">
        <h2>📦 特性一览</h2>
        <p>✅ 低饱和度护眼配色 & 暗黑模式自动切换<br>
           ✅ 响应式布局，移动端友好<br>
           ✅ 自定义 404 页面 & 多页面路由<br>
           ✅ 接入 Giscus 评论区（基于 GitHub Discussions）</p>
      </div>
    </main>

    <footer>
      &copy; <span id="year"></span> 你的名字. 由 GitHub Pages 驱动。
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
